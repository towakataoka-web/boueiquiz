<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【授業用】守くんの日常と防衛機制</title>
    <style>
        :root {
            --tokai-blue: #004098;
            --tokai-yellow: #ffcc00;
            --tokai-light: #e6f0ff;
            --primary: var(--tokai-blue);
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            background: var(--tokai-blue);
            background-image: linear-gradient(90deg, transparent 50%, rgba(255,255,255,0.1) 50%);
            background-size: 20px 100%;
            color: white;
            padding: 25px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            border-bottom: 5px solid var(--tokai-yellow);
        }

        nav {
            display: flex;
            background: #e9ecef;
        }

        .nav-item {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            border-bottom: 4px solid transparent;
        }

        .nav-item.active {
            color: var(--tokai-blue);
            border-bottom: 4px solid var(--tokai-blue);
            background: white;
        }

        .content {
            padding: 20px;
            flex: 1;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .image-wrapper {
            width: 100%;
            height: 320px;
            background: #e6f0ff;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 3px solid var(--tokai-blue);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 0.9rem;
            text-align: center;
            padding: 10px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid var(--tokai-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .char-msg {
            background: #fff;
            border: 2px solid var(--tokai-blue);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 8px solid var(--tokai-yellow);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .choice-btn {
            background: white;
            border: 2px solid var(--tokai-blue);
            padding: 15px 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--tokai-blue);
            cursor: pointer;
            transition: 0.2s;
        }

        .choice-btn:hover:not(:disabled) {
            background: var(--tokai-blue);
            color: white;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            border: 2px solid transparent;
        }

        .feedback-correct { background: #e6fffb; border-color: #00b894; color: #006b56; }
        .feedback-wrong { background: #fff1f0; border-color: #d63031; color: #a8071a; }

        .action-btn {
            background: var(--tokai-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--tokai-blue);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>SAGAMI PRIDE：心の防衛機制</header>
    
    <nav>
        <div id="nav-study" class="nav-item active" onclick="showScreen('study')">プロローグ</div>
        <div id="nav-quiz" class="nav-item" onclick="showScreen('quiz')">ストーリー</div>
        <div id="nav-dict" class="nav-item" onclick="showScreen('dict')">解説図鑑</div>
    </nav>

    <div class="content">
        <!-- Prologue -->
        <div id="screen-study" class="screen active">
            <div class="image-wrapper">
                <div id="loader-prologue" class="loading-overlay">
                    <div class="spinner"></div>
                    <div>AIが守くんを生成中...</div>
                </div>
                <img id="img-prologue" src="mamoru.prologue.jpg" alt="守くん">
            </div>
            <div class="char-msg">
                「僕は守。相模のタテジマを背負う高校生だ！高校生活は楽しいことばかりじゃない。悔しい時、不安な時、僕の心がどんな『守り』に入っているか、クイズで見抜いてくれ！」
            </div>
            <button class="action-btn" onclick="showScreen('quiz')">ストーリーを開始する</button>
        </div>

        <!-- Quiz -->
        <div id="screen-quiz" class="screen">
            <div id="quiz-init">
                <div class="image-wrapper">
                    <div id="loader-init" class="loading-overlay">
                        <div class="spinner"></div>
                        <div>生成中...</div>
                    </div>
                    <img id="img-init" src="mamoru.quiz.jpg" alt="野球部の守くん">
                </div>
                <h3>相模の日常：9つの試練</h3>
                <p>部活動での葛藤や、学校生活での不安。守くんの心の動きに隠された名前を当てましょう。</p>
                <button class="action-btn" onclick="startQuiz()">スタート</button>
            </div>

            <div id="quiz-play" style="display:none;">
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <div class="image-wrapper">
                    <img id="img-quiz" src="mamoru.quiz.jpg" alt="守くん">
                </div>
                <div id="q-scene" class="char-msg" style="font-weight:bold; color:var(--tokai-blue); background:var(--tokai-light);"></div>
                <div id="q-text" class="question-text"></div>
                <div id="choice-list" class="btn-grid"></div>
                <div id="feedback" class="feedback-box"></div>
                <button id="next-q-btn" class="action-btn" style="display:none;" onclick="nextQuestion()">次へ ▶</button>
            </div>

            <div id="quiz-result" style="display:none; text-align:center;">
                <div class="image-wrapper">
                    <img id="img-result" src="mamoru.epilogue.jpg" alt="結果">
                </div>
                <h3>スコアレポート</h3>
                <div id="result-score" style="font-size:2.5rem; font-weight:bold; color:var(--tokai-blue);">0 / 9</div>
                <button class="action-btn" onclick="startQuiz()">リトライ</button>
            </div>
        </div>

        <!-- Dictionary -->
        <div id="screen-dict" class="screen">
            <h3>防衛機制：解説図鑑</h3>
            <div id="dict-list"></div>
        </div>
    </div>
</div>

<script>
    const apiKey = ""; // 実行環境以外では空

    const masterData = [
        { 
            name: "抑圧", 
            scene: "試合での痛恨のミス...", 
            q: "「あのアウト？...なんだか、その瞬間のことだけ思い出せないんだ。」", 
            desc: "【抑圧】苦痛な記憶や欲求を、無意識の中に押し込めて忘れてしまうことです。" 
        },
        { 
            name: "合理化", 
            scene: "生徒会選挙で落選...", 
            q: "「これで勉強に集中できる時間が増えるから、落ちて正解だったんだ。」", 
            desc: "【合理化】失敗した時に自分に都合の良い理由をつけて、もっともらしく正当化することです。" 
        },
        { 
            name: "同一視", 
            scene: "プロ野球選手への憧れ...", 
            q: "「憧れの先輩と同じメーカーのグローブを使えば、僕もプロ級のプレーができる気がする！」", 
            desc: "【同一視】自分より優れた他者の特性を自分のものと思い込み、満足感を得ることです。" 
        },
        { 
            name: "投射", 
            scene: "部内の人間関係...", 
            q: "「あいつ、絶対僕のこと嫌ってるよね。目も合わせてくれないし、冷たすぎるよ。」（実は自分が相手を苦手だと思っている）", 
            desc: "【投射（投影）】自分が持っている後ろめたい感情を、相手が持っているものとして転嫁することです。" 
        },
        { 
            name: "反動形成", 
            scene: "厳しくて嫌いなコーチに...", 
            q: "「コーチ！いつもご指導ありがとうございます！」と、誰よりも元気に愛想よく振る舞う。", 
            desc: "【反動形成】抑圧した本心とは正反対の極端な態度や行動をとることです。" 
        },
        { 
            name: "逃避", 
            scene: "大事な期末テスト前...", 
            q: "「勉強しなきゃいけないのは分かってるんだけど...つい漫画の続きが気になって読んじゃうんだ。」", 
            desc: "【逃避】直面している困難や不安から、空想や別な快楽、病気の世界へ逃げ込むことです。" 
        },
        { 
            name: "退行", 
            scene: "弟が生まれて寂しい...", 
            q: "「お母さーん、自分でお着替えできないからやってー！」と甘えて泣き出した。", 
            desc: "【退行】耐えがたい状況に直面した際、より幼い段階の振る舞いに戻って保護を求めることです。" 
        },
        { 
            name: "代償", 
            scene: "怪我で野球を断念...", 
            q: "「野球はもうできないけど、これからはプログラミングで全国トップを目指して頑張るよ！」", 
            desc: "【代償】満たされなかった欲求を、別の目標を達成することで補おうとすることです。" 
        },
        { 
            name: "昇華", 
            scene: "溜まったストレスを...", 
            q: "「このやり場のない怒りをぶつけて、巨大なキャンバスに油絵を描き上げたんだ。名作だよ！」", 
            desc: "【昇華】社会的に認められない衝動を、芸術やスポーツなど価値ある活動へ転換することです。" 
        }
    ];

    async function fetchWithRetry(url, options, maxRetries = 3) {
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                if (i === maxRetries - 1) throw err;
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
    }

    async function generateMamoruImage(elementId, loaderId, promptSuffix) {
        if (!apiKey) return;

        const loader = document.getElementById(loaderId);
        if(loader) loader.style.display = 'flex';

        const prompt = `Japanese high school boy named Mamoru, short black hair, wearing vertical blue stripes baseball uniform, anime style, high quality, ${promptSuffix}`;
        
        try {
            const result = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: { prompt: prompt },
                    parameters: { sampleCount: 1 }
                })
            });

            if (result && result.predictions && result.predictions[0]) {
                const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                const img = document.getElementById(elementId);
                img.src = imageUrl;
                img.onload = () => { if(loader) loader.style.display = 'none'; };
            }
        } catch (error) {
            console.error("AI Generation failed.", error);
            if(loader) loader.style.display = 'none';
        }
    }

    let currentQuizIndex = 0;
    let score = 0;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');
        document.getElementById('nav-' + screenId).classList.add('active');
        
        if(screenId === 'study' && apiKey && !document.getElementById('img-prologue').src.includes('data:image')) {
            generateMamoruImage('img-prologue', 'loader-prologue', 'waving hand, smiling');
        }
    }

    function startQuiz() {
        document.getElementById('quiz-init').style.display = 'none';
        document.getElementById('quiz-result').style.display = 'none';
        document.getElementById('quiz-play').style.display = 'block';
        currentQuizIndex = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        const item = masterData[currentQuizIndex];
        const img = document.getElementById('img-quiz');
        const prologueImg = document.getElementById('img-prologue');
        
        if(prologueImg.src.includes('data:image')) {
            img.src = prologueImg.src;
        } else {
            img.src = 'mamoru.quiz.jpg';
        }
        
        document.getElementById('q-scene').innerText = `シーン${currentQuizIndex + 1}: ${item.scene}`;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-q-btn').style.display = 'none';
        document.getElementById('progress-fill').style.width = `${((currentQuizIndex + 1) / masterData.length) * 100}%`;

        const choiceArea = document.getElementById('choice-list');
        choiceArea.innerHTML = "";
        const choices = [item.name, ...masterData.filter(m => m.name !== item.name).sort(() => Math.random() - 0.5).slice(0, 3).map(m => m.name)].sort(() => Math.random() - 0.5);

        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.innerText = c;
            btn.onclick = () => checkAnswer(c, item.name, item.desc);
            choiceArea.appendChild(btn);
        });
    }

    function checkAnswer(user, ans, desc) {
        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        if (user === ans) {
            score++;
            fb.className = "feedback-box feedback-correct";
            fb.innerHTML = `<strong>正解！⭕</strong><br>${desc}`;
        } else {
            fb.className = "feedback-box feedback-wrong";
            fb.innerHTML = `<strong>残念...❌ 正解は【${ans}】</strong><br>${desc}`;
        }
        document.getElementById('next-q-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuizIndex++;
        if (currentQuizIndex < masterData.length) loadQuestion();
        else {
            document.getElementById('quiz-play').style.display = 'none';
            document.getElementById('quiz-result').style.display = 'block';
            document.getElementById('result-score').innerText = `${score} / ${masterData.length}`;
            const resImg = document.getElementById('img-result');
            const proImg = document.getElementById('img-prologue');
            if(proImg.src.includes('data:image')) resImg.src = proImg.src;
        }
    }

    function renderDictionary() {
        const list = document.getElementById('dict-list');
        list.innerHTML = masterData.map(item => `
            <div style="background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; border-left:5px solid var(--tokai-blue); box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                <strong style="color:var(--tokai-blue); font-size:1.1rem;">${item.name}</strong>
                <p style="font-size:0.9rem; color:#333; margin-top:8px; line-height:1.5;">${item.desc}</p>
            </div>
        `).join('');
    }

    window.onload = () => {
        if (apiKey) {
            generateMamoruImage('img-prologue', 'loader-prologue', 'waving hand, smiling');
            generateMamoruImage('img-init', 'loader-init', 'holding a baseball bat, determined look');
        }
        renderDictionary();
    };
</script>
</body>
</html>
